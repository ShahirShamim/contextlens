server {
    # Cloud Run sends traffic to $PORT, which defaults to 8080.
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    # Everything no-cache except images: index.html, app.js, styles.css and
    # model.json version together — stale-JS/fresh-HTML skew breaks the app.
    location ~* \.(html|js|css|json)$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.png$ {
        add_header Cache-Control "public, max-age=3600";
    }
}
